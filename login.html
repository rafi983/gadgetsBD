<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sign In - Gadgets BD</title>
        <!-- Lucide Icons -->
        <script src="https://unpkg.com/lucide@latest"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            amazon: {
                                background: "#FFFFFF",
                                light: "#232F3E",
                                DEFAULT: "#131921",
                                text: "#111111",
                                blue: "#0066c0",
                                orange: "#C7511F",
                                yellow: "#FFD814",
                                yellow_hover: "#F7CA00",
                                secondary: "#FFA41C",
                            },
                        },
                        fontFamily: {
                            sans: ["Arial", "sans-serif"],
                        },
                    },
                },
            };
        </script>
        <style>
            body {
                font-family: Arial, sans-serif;
            }
            .a-box {
                border: 1px solid #ddd;
                border-radius: 4px;
            }
            .a-button-primary {
                background: linear-gradient(to bottom, #f7dfa5, #f0c14b);
                border: 1px solid #a88734;
                border-color: #a88734 #9c7e31 #846a29;
            }
            .a-button-primary:hover {
                background: linear-gradient(to bottom, #f5d78e, #eeb933);
            }
        </style>
    </head>
    <body
        class="bg-white text-amazon-text flex flex-col min-h-screen items-center pt-8"
    >
        <!-- Logo -->
        <div class="mb-4">
            <a href="index.html" class="flex items-center">
                <span class="text-3xl font-bold tracking-tighter text-black"
                    >gadgets<span class="italic text-amazon-secondary"
                        >BD</span
                    ></span
                >
            </a>
        </div>

        <!-- Login Card -->
        <div class="w-full max-w-[350px] p-6 a-box mb-6">
            <h1 class="text-2xl font-normal mb-4">Sign in</h1>

            <form action="index.html" method="GET" class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-bold mb-1"
                        >Email or mobile phone number</label
                    >
                    <input
                        type="email"
                        id="email"
                        required
                        class="w-full px-2 py-1.5 border border-gray-400 rounded-sm outline-none focus:ring-1 focus:ring-amazon-secondary focus:border-amazon-secondary"
                    />
                </div>

                <div>
                    <div class="flex justify-between mb-1">
                        <label for="password" class="text-sm font-bold"
                            >Password</label
                        >
                        <a
                            href="#"
                            class="text-sm text-amazon-blue hover:text-amazon-orange hover:underline"
                            >Forgot your password?</a
                        >
                    </div>
                    <input
                        type="password"
                        id="password"
                        required
                        class="w-full px-2 py-1.5 border border-gray-400 rounded-sm outline-none focus:ring-1 focus:ring-amazon-secondary focus:border-amazon-secondary"
                    />
                </div>

                <button
                    type="submit"
                    class="w-full py-1.5 a-button-primary text-sm font-medium rounded-sm cursor-pointer"
                >
                    Sign in
                </button>
            </form>

            <div class="mt-4 text-xs">
                <p>
                    By continuing, you agree to Gadgets BD's
                    <a href="#" class="text-amazon-blue hover:underline"
                        >Conditions of Use</a
                    >
                    and
                    <a href="#" class="text-amazon-blue hover:underline"
                        >Privacy Notice</a
                    >.
                </p>
            </div>

            <div class="mt-4">
                <a
                    href="#"
                    class="text-sm text-amazon-blue hover:text-amazon-orange hover:underline flex items-center gap-1"
                >
                    <i data-lucide="chevron-right" class="w-3 h-3"></i>
                    Need help?
                </a>
            </div>
        </div>

        <!-- Divider -->
        <div class="w-full max-w-[350px] mb-4">
            <div class="relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-xs">
                    <span class="bg-white px-2 text-gray-500"
                        >New to Gadgets BD?</span
                    >
                </div>
            </div>
        </div>

        <!-- Create Account Button -->
        <div class="w-full max-w-[350px] mb-8">
            <a
                href="register.html"
                class="block w-full py-1.5 border border-gray-400 rounded-sm text-center text-sm hover:bg-gray-50 transition-colors"
            >
                Create your Gadgets BD account
            </a>
        </div>

        <!-- Footer -->
        <footer class="mt-auto w-full border-t border-gray-300 bg-gray-50">
            <div
                class="max-w-[1000px] mx-auto py-6 px-4 text-center text-xs text-gray-600"
            >
                <div class="flex justify-center gap-6 mb-4">
                    <a href="#" class="text-amazon-blue hover:underline"
                        >Conditions of Use</a
                    >
                    <a href="#" class="text-amazon-blue hover:underline"
                        >Privacy Notice</a
                    >
                    <a href="#" class="text-amazon-blue hover:underline"
                        >Help</a
                    >
                </div>
                <p class="text-gray-500">
                    &copy; 2025 Gadgets BD - Premium Tech Marketplace. All
                    rights reserved by LWS.
                </p>
            </div>
        </footer>

        <script>
            lucide.createIcons();
        </script>
    </body>
</html>
